name: Update Language Statistics

on:
  schedule:
    - cron: "0 0 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: StefVuck/Github-Language-Stats@v1.2.0
        with:
          github_token: ${{ secrets.STATS_TOKEN }}
          visualization_types: "leaderboard bar donut"
          output_path: "language-stats"
          exclude_languages: "HTML,CSS,Markdown"
          include_forks: "false"
          top_repos_count: "10"
          dark_mode: "true"
          use_loc: "true"
          commit_message: "Update language statistics"
